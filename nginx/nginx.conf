keepalive_timeout 65;
server_tokens off;

# upstream for your Node.js app (change port if needed)
upstream node_app {
    server 127.0.0.1:3000;
}

# Main HTTPS server (HTTP/3 via QUIC)
server {
    # HTTP/3 (QUIC) listens
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;

    server_name cdrn.cc;  # <-- set your hostname or IP

    http2 on;
    http3 on;

    # TLS certs (use real paths or Let's Encrypt certs)
    ssl_certificate /etc/letsencrypt/live/cdrn.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdrn.cc/privkey.pem;

    # QUIC/HTTP3 requires TLS1.3
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # Advertise HTTP/3 availability to clients
    add_header Alt-Svc 'h3="\":443\""';
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    add_header Content-Security-Policy "default-src 'self' eniallator.github.io";
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";

    # Set the filesystem root (change to where your repo's `public` lives on the server)
    # Example on deploy: /var/www/personal-website/public
    root /var/www/personal-website/public;

    # Serve static assets under /static/ directly from disk with long caching
    location /static/ {
        alias /var/www/personal-website/public/static/; # ABSOLUTE path to `public/static`
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri $uri/ =404;
    }

    # Serve the CV PDF directly (exact match)
    location = /cv/nialls_cv.pdf {
        alias /var/www/personal-website/public/cv/nialls_cv.pdf; # ABSOLUTE path to file
        access_log off;
        expires 7d;
        add_header Content-Disposition "inline";
    }

    # Optional: serve other static top-level public files if you want
    location /favicon.ico {
        try_files $uri =404;
    }

    # Proxy everything else to the Node.js backend
    location / {
        proxy_pass http://node_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cdrn.cc;

    # Allow Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/personal-website/public;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Notes:
# - You need an nginx build with QUIC/HTTP3 support (nginx >= 1.25 with proper OpenSSL or BoringSSL).
# - Open UDP/443 in firewall to allow QUIC.
# - Replace all placeholder paths (`/var/www/personal-website/public`) with the actual
#   paths where you deploy this repo on the server.
# - Use Certbot (Let's Encrypt) or your CA to obtain certificates and point
#   `ssl_certificate` / `ssl_certificate_key` at the generated files.
